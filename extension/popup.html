<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WP Publisher Connector</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        width: 340px;
        background: #0b0d10;
        color: #e6e9ee;
        font-family: -apple-system, system-ui, sans-serif;
        font-size: 13px;
      }
      .wrap { padding: 14px 16px; }
      h1 { font-size: 14px; margin: 0 0 2px; font-weight: 600; }
      .sub { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 14px; }
      .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
      .card.warn { border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.05); }
      .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
      .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
      .name { font-weight: 600; }
      .status { font-size: 11px; }
      .ok { color: #4ade80; }
      .miss { color: rgba(255,255,255,0.45); }
      .err { color: #fb7185; }
      button { font: inherit; cursor: pointer; }
      button.primary {
        width: 100%; margin-top: 8px;
        padding: 8px 10px; border-radius: 6px; border: 1px solid rgba(16,185,129,0.3);
        background: rgba(16,185,129,0.18); color: #6ee7b7;
        transition: background 0.15s;
      }
      button.primary:hover:not(:disabled) { background: rgba(16,185,129,0.28); }
      button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
      button.ghost {
        margin-top: 6px; padding: 4px 8px; font-size: 11px;
        border-radius: 4px; border: 1px solid rgba(255,255,255,0.1);
        background: transparent; color: rgba(255,255,255,0.6);
      }
      button.ghost:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
      input[type="text"] {
        width: 100%; padding: 6px 8px; border-radius: 6px;
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.04);
        color: inherit; font: inherit; box-sizing: border-box;
      }
      .small { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 6px; }
      .toast { padding: 8px 12px; margin: 8px 0; border-radius: 6px; font-size: 12px; }
      .toast.ok { background: rgba(16,185,129,0.1); color: #6ee7b7; }
      .toast.err { background: rgba(244,63,94,0.1); color: #fda4af; }
      details summary { cursor: pointer; color: rgba(255,255,255,0.5); font-size: 11px; user-select: none; }
      details > div { margin-top: 8px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>WP Publisher Connector</h1>
      <div class="sub">Shares your Surfer/Frase login with the dashboard.</div>

      <div id="project-card" class="card">
        <div class="label">Active project</div>
        <div id="project-name" class="name">Loading…</div>
        <div id="project-hint" class="small"></div>
      </div>

      <div id="toast" style="display:none"></div>

      <div class="card">
        <div class="row">
          <div>
            <div class="name">Surfer SEO</div>
            <div id="surfer-status" class="status miss">Checking…</div>
          </div>
        </div>
        <button id="connect-surfer" class="primary" disabled>Connect Surfer</button>
      </div>

      <div class="card">
        <div class="row">
          <div>
            <div class="name">Frase</div>
            <div id="frase-status" class="status miss">Checking…</div>
          </div>
        </div>
        <button id="connect-frase" class="primary" disabled>Connect Frase</button>
      </div>

      <details>
        <summary>App URL</summary>
        <div>
          <input id="app-url" type="text" placeholder="http://localhost:3030" />
          <button id="save-url" class="ghost">Save</button>
          <div class="small">Set this if your dashboard is deployed somewhere other than localhost.</div>
        </div>
      </details>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
